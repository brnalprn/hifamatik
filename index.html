<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hifamatik Premium</title>
    <style>
        :root {
            --p1-color: #3b82f6;
            --p2-color: #ef4444;
            --bg: #030712;
            --card: #111827;
            --text: #f8fafc;
            --accent: #8b5cf6;
            --gold: linear-gradient(45deg, #fbbf24, #d97706);
            --premium-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            animation: containerAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.2px;
            margin: 0;
        }

        .premium-badge {
            font-size: 0.6rem;
            background: var(--gold);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 800;
            vertical-align: middle;
            margin-left: 5px;
            text-transform: uppercase;
        }

        #gameScreen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .turn-box {
            padding: 14px;
            border-radius: 20px;
            text-align: center;
            font-weight: 800;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .p1-active {
            background: var(--p1-color);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .p2-active {
            background: var(--p2-color);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .question-display {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 22px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.05rem;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
        }

        .bonus-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .bonus-btn {
            font-size: 0.7rem;
            padding: 10px 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #d1d5db;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .bonus-btn:hover {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
        }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .num-grid::-webkit-scrollbar {
            width: 4px;
        }

        .num-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .num-item {
            background: #1f2937;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }

        .num-item:active {
            transform: scale(0.85);
            background: var(--accent);
            color: white;
        }

        .num-item.used {
            background: rgba(0, 0, 0, 0.3);
            color: #475569;
            opacity: 0.4;
            pointer-events: none;
            text-decoration: line-through;
            border: none;
        }

        .history-log {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 15px;
            border-radius: 15px;
            height: 60px;
            overflow-y: auto;
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
        }

        .footer-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .reset-link {
            color: #4b5563;
            font-size: 0.7rem;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="brand-header">
            <h1 class="brand-name">Hifamatik<span class="premium-badge">PRO</span></h1>
        </div>

        <div id="gameScreen">
            <div id="turnIndicator" class="turn-box">SIRA SENDE: OYUNCU 1</div>

            <div class="question-display" id="questionBox">
                <span style="color: #64748b; font-style: italic;">Başlamak için bir numara seç...</span>
            </div>

            <div class="bonus-actions" id="bonusActions" style="display: none;">
                <button class="bonus-btn" onclick="bonusAction('skip')">Soru Atla ⏭️</button>
                <button class="bonus-btn" onclick="bonusAction('pass')">Pasla 🔄</button>
                <button class="bonus-btn" onclick="bonusAction('mercy')">Merhamet 🙏</button>
            </div>

            <div class="num-grid" id="numberGrid"></div>

            <div class="history-log" id="historyLog">
                <div class="log-entry" style="color: #4b5563; justify-content: center;">Düello Başladı.</div>
            </div>

            <div class="footer-controls">
                <span onclick="resetGame()" class="reset-link">TÜMÜNÜ SIFIRLA</span>
            </div>
        </div>
    </div>

    <script>
        const baseQuestions = [
            "İlk tanıştığımızda benimle ilgili aklından geçen ilk cümle neydi?", "Hangi şarkı seni en iyi anlatıyor? Linkini veya adını gönder.", "Şu anki ortamını tek bir fotoğrafla göster.", "Benimle ilgili en çok hangi özelliğin seni şaşırtıyor?", "Çocukken kurduğun en büyük hayal neydi?", "Eğer bir günlüğün olsaydı, bugünkü sayfada benden bahseder miydin?", "En sevdiğin tatlıyı söyle, bir gün beraber yiyelim.", "Şu an telefonunun ana ekranında ne var? Ekran görüntüsü at.", "Bana rastgele bir soru sor, dürüstlük yemini ediyorum.", "Zaman makinen olsa hangi ana geri dönmek isterdin?", "İnsanların senin hakkında en çok yanıldığı şey nedir?", "Hangi konuda asla taviz vermezsin?", "Bana bugün seni en çok neyin güldürdüğünü ses kaydıyla anlat.", "Bir film karakteri olsan kim olurdun?", "Sana 'günaydın' mesajı atmam gününü nasıl etkiler?", "En büyük korkun nedir? (Hala dostuz, aramızda kalacak!)", "Sence aramızdaki en belirgin ortak nokta ne?", "Günün yorgunluğunu atmak için yaptığın en iyi aktivite?", "Bana galerindeki en anlamlı fotoğrafı gönder.", "Bir süper gücün olsa ve sadece bir saat sürecek olsa ne yapardın?", "Benim hakkında dürüst bir tahminde bulun.", "En sevdiğin mevsim hangisi ve neden?", "Seni en çok ne sinirlendirir?", "Bana bir emoji gönder, o emojinin senin için ne ifade ettiğini tahmin edeyim.", "Daha önce kimseye anlatmadığın küçük bir hobin var mı?", "İlk buluşma için sence en ideal yer neresidir?", "Eski sevgililerinin ortak bir özelliği var mı?", "Bir adada mahsur kalsan yanına alacağın 3 şey?", "Bana şık bir iltifat et.", "Hayatındaki en büyük 'iyi ki' dediğin kişi veya olay?", "Gece kuşu musun yoksa sabah insanı mı?", "Şu an aklından geçen en random düşünce nedir?", "Benimle bir macera yaşayacak olsan bu ne olurdu?", "En son hangi filmde veya kitapta ağladın?", "Kendinde en çok sevdiğin fiziksel özellik?", "Sence dürüstlük mü daha önemli yoksa nezaket mi?", "Bana huzuru anlatan bir fotoğraf gönder.", "Bir günlüğüne yer değiştirecek olsak benim hayatımda neyi değiştirmek isterdin?", "En sevdiğin koku nedir?", "Bana bir şarkı sözüyle cevap ver.", "Hakkımda merak ettiğin ama sormadığın bir şey?", "Sence güven kazanmak mı daha zor yoksa kaybetmek mi?", "Eğer bir yemek olsaydı hangisi olurdun?", "Şu an ellerin nerede? (Sadece merak!)", "Hayallerindeki ev nasıl bir yer?", "En çok hangi konuda kendine güveniyorsun?", "Bana çocukluk fotoğrafını gönder (varsa!).", "Beni bir renkle tanımlasan bu ne olurdu?", "En sevdiğin kaçış noktan neresi?", "Sence aşk tesadüfleri mi sever yoksa çaba mı?", "Bana bugün yediğin en güzel şeyের fotoğrafını at.", "Zekâ mı daha çekici yoksa espri anlayışı mı?", "Kendine verdiğin en büyük söz nedir?", "Bana bir ses kaydı at ve içinde 'Hifamatik' kelimesi geçsin.", "Dünyadaki herkes seni dinliyor olsa onlara ne söylerdin?", "Hayatında verdiğin en cesur karar?", "Bana en sevdiğin şiiri veya özlü sözü gönder.", "Sence arkadaşlıktan aşka dönüşen ilişkiler daha mı kalıcıdır?", "En sevdiğin oyun veya uygulama hangisi?", "Şu anki modunu 3 kelimeyle anlat.", "Benim hakkımda gördüğün en ilginç rüya (varsa)?", "Birine karşı hissettiğin en büyük pişmanlık?", "Eğer görünmez olsaydın ilk nereye giderdin?", "Bana bir yer öner, mutlaka gitmelisin dediğin.", "En sevdiğin çocukluk oyuncağın neydi?", "Hangi konuda bir uzman olmak isterdin?", "Sence dış görünüş mü daha önemli karakter mi? (Dürüst ol!)", "Bana şu an giydiğin ayakkabıların/terliklerin fotoğrafını at.", "Hayatında aldığın en garip hediye?", "Bana bir şaka yap, gülmem lazım.", "Seni en çok ne motive eder?", "Eğer bir hayvan olsan hangisi olurdun?", "Hakkımda duyduğun en garip şey?", "Kendi hayatını bir kitap yapsan adı ne olurdu?", "Bana en sevdiğin içeceğin fotoğrafını gönder.", "Sence mutluluğun sırrı nedir?", "Bir konsere gidecek olsan kimin konserine giderdin?", "Benimle ilgili en sevdiğin anı (henüz kısa da olsa)?", "Hangi dili akıcı konuşmak isterdin?", "Seni tanımlayan en iyi kelime?", "Bana bir çizim yap (basitçe) ve gönder.", "Hangi ünlüyle bir akşam yemeği yemek isterdin?", "Sence sadakat ne demektir?", "Bana bugün aklına takılan bir şarkıyı mırıldanıp ses kaydı at.", "Hayatındaki en büyük dönüm noktası?", "Eğer bir piyango çıksa yapacağın ilk şey?", "Bana bir dizi öner, mutlaka izlemelisin dediğin.", "Hangi doğa olayı seni en çok etkiler?", "Sence ilk görüşte aşk mümkün mü?", "Bana en sevdiğin manzaranın tarifini yap.", "Kendinde değiştirmek istediğin bir özellik?", "Eğer bir koku olsaydı ne kokardın?", "Bana en çok kullandığın emojiyi gönder.", "Hayatın boyunca unutamadığın bir öğüt?", "Benimle ilgili bir gizem söyle (benim bilmediğim).", "Sence huzur nerede bulunur?", "Bana şu an yanındaki en ilginç objeyi göster.", "En sevdiğin seyahat anın?", "Bana bir sırrını ama çok küçük bir sırrını söyle.", "Hifamatik'in bu sorusuna kadar en çok hangi soru seni zorladı?",
            "Şu an tam karşında ne duruyor?", "Hayatını bir renkle boyasan hangi rengi seçerdin?", "En son kime, neden yalan söyledin?", "Bana bir kelime ver, sana bir hikaye uydurayım.", "En sevdiğin sosyal medya platformu hangisi?", "Kendini 10 yıl sonra nerede görüyorsun?", "Sabah uyandığında yaptığın ilk şey nedir?", "Bana bir yemek tarifi ver (en basitinden).", "Sence en romantik jest nedir?", "Hangi ünlüye benzetiliyorsun?", "Sana göre 'güç' ne demektir?", "En sevdiğin çizgi film neydi?", "Bana telefonundaki son aramayı söyle.", "Hangi meyve senin karakterini yansıtır?", "Kendini bir mevsimle tanımla.", "Bana hayalindeki tatili anlat.", "En son ne için 'değmezmiş' dedin?", "Bir ormanda kaybolsan ne yapardın?", "Sence şans mı daha önemli çalışmak mı?", "Bana bir ses kaydıyla en sevdiğin kelimeyi söyle.", "Bir dahi olsan hangi alanda olurdun?", "En sevdiğin kitap karakteri kim?", "Bana bugün yaptığın bir iyiliği anlat.", "Hayatındaki en büyük korkun gerçekleşse ne yaparsın?", "Bana bir şarkı mırıldan, tahmin edeyim.", "En çok hangi özelliğinle gurur duyuyorsun?", "Sence 'ev' neresidir?", "Hangi tarihi kişilikle sohbet etmek isterdin?", "Bana şu anki ruh halini anlatan bir nesne göster.", "En sevdiğin teknolojik alet nedir?", "Bana bir bilmece sor.", "Sence bir ilişkide en büyük 'kırmızı bayrak' nedir?", "Hayatında en çok kime teşekkür etmek istersin?", "En son ne zaman birine sarıldın?", "Bana galerindeki 13. fotoğrafı anlat.", "Hangi element seni temsil ediyor? (Ateş, Su, Toprak, Hava)", "Sence özgürlük nedir?", "Bana bir takma ad taksan ne olurdu?", "En sevdiğin sokak yemeği hangisi?", "Hangi dilde şarkı dinlemeyi seversin?", "Bana çocukken yaptığın bir yaramazlığı anlat.", "En çok kime güveniyorsun?", "Hayatında hiç 'mucize' dediğin bir şey oldu mu?", "Bana şu anki kombinini puanlat.", "Sence affetmek mi daha zordur unutmak mı?", "Bir günlüğüne görünmez olsan ne yapardın?", "En sevdiğin çiçek hangisi?", "Bana bir hayat dersi ver.", "Hangi sporla ilgilenmek isterdin?", "Sence en büyük lüks nedir?", "Bana bugün seni şaşırtan bir şey söyle.", "En sevdiğin sabah içeceği nedir?", "Hangi süper kahraman senin idolün?", "Bana bir kelimeyle 'aşk'ı tanımla.", "En son ne zaman birine 'seni seviyorum' dedin?", "Sence para mutluluk getirir mi?", "Bana bir fotoğraf at, içinde mavi bir şey olsun.", "Hangi enstrümanı çalmak isterdin?", "Sence en büyük erdem nedir?", "Bana bir şiir oku veya yaz.", "Hayatında en çok gitmek istediğin ülke?", "En sevdiğin kahve türü hangisi?", "Bana bir itirafta bulun.", "Sence yalnızlık mı daha zor yoksa kalabalık mı?", "Hangi koku sana çocukluğunu hatırlatıyor?", "Bana bugün en çok kullandığın uygulamayı göster.", "En büyük hayal kırıklığın neydi?", "Sence dahi mi olmak istersin yoksa mutlu mu?", "Bana bir film öner, hayatımı değiştirsin.", "En sevdiğin dans türü nedir?", "Hangi konuda çok inatçısın?", "Bana bir fotoğraf gönder, en sevdiğin yer olsun.", "Sence kader var mıdır?", "En çok hangi şehre aitsin?", "Bana bir tavsiye ver, bugün uygulayayım.", "Hangi meyve suyunu seversin?", "Sence zaman her şeyin ilacı mıdır?", "Bana bir ses kaydı at, sadece gülümse.", "En sevdiğin mitolojik karakter?", "Hangi yeteneğe sahip olmak isterdin?", "Bana şu an aklından geçen ilk ismi söyle.", "Sence samimiyet nedir?", "En son ne zaman kendinle gurur duydun?", "Bana bir emoji gönder, o benim olsun.", "Hangi ünlüyle arkadaş olmak isterdin?", "Sence sabır neyi çözer?", "Bana bir manzara fotoğrafı at, pencerenin dışı olsun.", "En sevdiğin kış aktivitesi?", "Hangi kelimeyi çok sık kullanıyorsun?", "Bana bir sırrını fısılda (yazarak).", "Sence güven ne zaman kırılır?", "En sevdiğin tatil anısı?", "Bana bir şarkı gönder, seni bana anlatsın.", "Hangi konuda çok yeteneklisin?", "Sence gerçek dostluk nedir?", "Bana bugün yediğin bir şeyin ismini söyle.", "En sevdiğin oyun türü?", "Hangi konuda çok hassassın?", "Bana bir soru sor, cevaplamaktan korktuğum.", "Hifamatik sence nasıl bir uygulama?"
        ];

        const questions = {};
        baseQuestions.forEach((q, index) => { questions[index + 1] = q; });

        let currentPlayer = 1;
        let usedNumbers = [];
        let currentQuestionNum = null;

        function loadState() {
            const savedUsed = localStorage.getItem('hifamatik_used');
            const savedPlayer = localStorage.getItem('hifamatik_player');
            if (savedUsed) usedNumbers = JSON.parse(savedUsed);
            if (savedPlayer) currentPlayer = parseInt(savedPlayer);
        }

        function saveState() {
            localStorage.setItem('hifamatik_used', JSON.stringify(usedNumbers));
            localStorage.setItem('hifamatik_player', currentPlayer);
        }

        function resetGame() {
            if (confirm("Tüm Premium ilerlemen sıfırlanacak. Emin misin?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function initGame() {
            loadState();
            updateUI();
            renderGrid();
            renderHistory();
        }

        function renderGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 200; i++) {
                const item = document.createElement('div');
                const isUsed = usedNumbers.includes(i);
                item.className = 'num-item' + (isUsed ? ' used' : '');
                item.innerText = i;
                if (!isUsed) item.onclick = () => handleMove(i);
                grid.appendChild(item);
            }
        }

        function updateUI() {
            const indicator = document.getElementById('turnIndicator');
            indicator.innerText = `SIRA SENDE: OYUNCU ${currentPlayer}`;
            indicator.className = `turn-box p${currentPlayer}-active`;
        }

        function handleMove(num) {
            currentQuestionNum = num;
            const qBox = document.getElementById('questionBox');

            qBox.style.animation = 'none';
            qBox.offsetHeight;
            qBox.style.animation = 'slideIn 0.4s ease-out forwards';

            qBox.innerHTML = `
            <div style="font-size:0.7rem; color:var(--accent); font-weight:bold; margin-bottom:5px;">PREMIUM SORU #${num}</div>
            <div style="color:white; font-weight:500;">${questions[num]}</div>
        `;

            document.getElementById('bonusActions').style.display = 'grid';
            addToHistory(num, `seçti`);
            usedNumbers.push(num);
            saveState();
            renderGrid();
            switchTurn();
        }

        function switchTurn() {
            currentPlayer = (currentPlayer === 1) ? 2 : 1;
            updateUI();
            saveState();
        }

        function addToHistory(num, action) {
            const log = document.getElementById('historyLog');
            if (usedNumbers.length === 0 && !localStorage.getItem('hifamatik_used')) log.innerHTML = '';
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const color = (currentPlayer === 1) ? 'var(--p1-color)' : 'var(--p2-color)';
            entry.innerHTML = `<span style="color: ${color}; font-weight:bold;">P${currentPlayer}</span> <span style="color:#94a3b8">${num ? num + '.' : ''} ${action}</span>`;
            log.prepend(entry);
            localStorage.setItem('hifamatik_log', log.innerHTML);
        }

        function renderHistory() {
            const savedLog = localStorage.getItem('hifamatik_log');
            if (savedLog) document.getElementById('historyLog').innerHTML = savedLog;
        }

        function bonusAction(type) {
            if (!currentQuestionNum) return;
            const qBox = document.getElementById('questionBox');

            if (type === 'skip') {
                qBox.innerHTML = `<span style="color: #94a3b8;">Soru pas geçildi. Yeni bir sayı seçebilirsiniz.</span>`;
                addToHistory(null, `SORU ATLADI ⏭️`);
            } else if (type === 'pass') {
                qBox.innerHTML = `<div style="color:var(--accent); font-weight:bold;">PASLANDI!</div><div style="color:white">${questions[currentQuestionNum]}</div><div style="font-size:0.7rem; margin-top:10px; color:#94a3b8;">Şimdi cevaplama sırası rakibinde!</div>`;
                addToHistory(null, `SORUYU PASLADI 🔄`);
            } else if (type === 'mercy') {
                qBox.innerHTML = `<div style="color:#fbbf24; font-weight:bold;">MERHAMET DİLENİLDİ 🙏</div><div style="color:#94a3b8">Rakibin sana hafif bir ceza versin veya başka bir soru seçtirsin.</div>`;
                addToHistory(null, `MERHAMET DİLEDİ 🙏`);
            }

            document.getElementById('bonusActions').style.display = 'none';
            currentQuestionNum = null;
        }

        // OYUNU OTOMATİK BAŞLAT
        window.onload = initGame;
    </script>

</body>

</html>
