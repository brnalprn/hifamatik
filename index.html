<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hifamatik</title>
    <style>
        :root {
            --p1-color: #3b82f6;
            --p2-color: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #8b5cf6;
            /* Mor tonu Hifamatik ismine çok yakışıyor */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #8b5cf6, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Başlangıç Ekranı */
        #setupScreen {
            text-align: center;
            padding: 20px 0;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        /* Oyun Ekranı */
        #gameScreen {
            display: none;
        }

        .turn-box {
            padding: 14px;
            border-radius: 15px;
            text-align: center;
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .p1-active {
            background: var(--p1-color);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .p2-active {
            background: var(--p2-color);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .question-display {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #334155;
            padding: 20px;
            border-radius: 18px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.15rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .num-item {
            background: #334155;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .num-item:active {
            transform: scale(0.9);
            background: var(--accent);
        }

        .num-item.used {
            background: #0f172a;
            color: #475569;
            opacity: 0.3;
            pointer-events: none;
            text-decoration: line-through;
        }

        .history-log {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.8rem;
            border: 1px solid #334155;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
        }

        button.main-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="brand-name">Hifamatik</div>

        <div id="setupScreen">
            <p style="color: #94a3b8; font-size: 1.1rem;">Düello başlıyor!<br>İlk seçimi kim yapıyor?</p>
            <div class="btn-group">
                <button class="main-btn" onclick="startGame(1)" style="background: var(--p1-color)">P1 Başla</button>
                <button class="main-btn" onclick="startGame(2)" style="background: var(--p2-color)">P2 Başla</button>
            </div>
        </div>

        <div id="gameScreen">
            <div id="turnIndicator" class="turn-box">Sıra Sende: P1</div>

            <div class="question-display" id="questionBox">
                <span style="color: #94a3b8; font-size: 0.9rem;">Bir sayıya dokun ve düelloyu yönet!</span>
            </div>

            <div class="num-grid" id="numberGrid"></div>

            <div class="history-log" id="historyLog">
                <div class="log-entry" style="color: #64748b; justify-content: center;">Henüz hamle yapılmadı.</div>
            </div>

            <div style="text-align: center; margin-top: 15px;">
                <span onclick="location.reload()"
                    style="color: #64748b; font-size: 0.8rem; text-decoration: underline; cursor: pointer;">Oyunu
                    Sıfırla</span>
            </div>
        </div>
    </div>

    <script>
        const questions = {
            1: "Bugün seni en çok gülümseten an neydi?",
            2: "Beni en iyi anlatan 3 emoji gönder",
            3: "Favori şarkını paylaş, birlikte dinleyelim",
            4: "Benim hakkımdaki ilk dürüst düşüncen neydi?",
            5: "Şu anki ruh halini bir fotoğrafla anlat",
            6: "En sevdiğin tatlı nedir? (Belki bir gün yeriz)",
            7: "Bana dürüstlük gerektiren bir soru sor",
            8: "Şu an çevrende ne var? Bir foto çek!",
            9: "İzlediğin en etkileyici film hangisiydi?",
            10: "En huzurlu hissettiğin yer neresi?",
            11: "İnsanların senin hakkında yanıldığı bir şey?",
            12: "Ruhunu yansıtan bir şarkı gönder",
            13: "Kimsenin bilmediği garip bir alışkanlığın?",
            14: "Galerindeki en komik/random fotoğrafı gönder",
            15: "Mükemmel bir ilk buluşma planın nasıl olur?",
            16: "Gece kuşumusun yoksa sabah insanı mı?",
            17: "Bir emoji gönder, anlamını tahmin edeyim",
            18: "Hayalindeki tatil rotası neresi?",
            19: "Bana sormaya çekindiğin bir şeyi sor",
            20: "Bugün aklından geçen en saçma düşünce neydi?"
        };

        let currentPlayer = 1;
        let usedNumbers = [];

        function startGame(player) {
            currentPlayer = player;
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            updateUI();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 20; i++) {
                const item = document.createElement('div');
                const isUsed = usedNumbers.includes(i);
                item.className = 'num-item' + (isUsed ? ' used' : '');
                item.innerText = i;
                if (!isUsed) {
                    item.onclick = () => handleMove(i);
                }
                grid.appendChild(item);
            }
        }

        function updateUI() {
            const indicator = document.getElementById('turnIndicator');
            indicator.innerText = `SIRA SENDE: OYUNCU ${currentPlayer}`;
            indicator.className = `turn-box p${currentPlayer}-active`;
        }

        function handleMove(num) {
            const log = document.getElementById('historyLog');
            const qBox = document.getElementById('questionBox');

            qBox.innerHTML = `<small style="color: #a78bfa; font-weight:bold;">${num} NUMARALI SORU</small><div style="margin-top:8px">${questions[num]}</div>`;

            if (usedNumbers.length === 0) log.innerHTML = '';

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const color = (currentPlayer === 1) ? 'var(--p1-color)' : 'var(--p2-color)';
            entry.innerHTML = `<span style="color: ${color}">P${currentPlayer}</span> <span>${num} seçildi</span>`;
            log.prepend(entry);

            usedNumbers.push(num);
            currentPlayer = (currentPlayer === 1) ? 2 : 1;

            updateUI();
            renderGrid();
        }
    </script>

</body>

</html>
